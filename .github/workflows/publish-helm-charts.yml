name: Publish Helm chart

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - operations/family-link-exporter-helm-chart/**

env:
  REGISTRY: ghcr.io
  CHARTS_NAMESPACE: cznewt/charts
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: "Package & push chart to ghcr.io OCI"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login \
            ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Lint chart
        run: helm lint operations/family-link-exporter-helm-chart

      - name: Package and push chart
        run: |
          mkdir -p /tmp/charts
          helm package operations/family-link-exporter-helm-chart -d /tmp/charts
          for pkg in /tmp/charts/*.tgz; do
            echo "Pushing $pkg to oci://${REGISTRY}/${CHARTS_NAMESPACE}"
            helm push "$pkg" "oci://${REGISTRY}/${CHARTS_NAMESPACE}"
          done

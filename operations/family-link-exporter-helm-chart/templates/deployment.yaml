apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "family-link-exporter.fullname" . }}
  labels:
    {{- include "family-link-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "family-link-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "family-link-exporter.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "family-link-exporter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          env:
            - name: FLE_HOST
              value: "0.0.0.0"
            - name: FLE_PORT
              value: {{ .Values.service.port | quote }}
            - name: FLE_TIMEZONE
              value: {{ .Values.config.timezone | quote }}
            - name: FLE_REFRESH_INTERVAL
              value: {{ .Values.config.refreshInterval | quote }}
            - name: FLE_ACCOUNT_IDS
              value: {{ .Values.config.accountIds | quote }}
            - name: FLE_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            {{- if .Values.families }}
            - name: FLE_CONFIG
              value: /etc/family-link/config/config.yaml
            {{- else if include "family-link-exporter.hasSession" . }}
            {{- if eq .Values.auth.mode "cookieFile" }}
            - name: FLE_COOKIE_FILE
              value: "{{ .Values.auth.mountPath }}/{{ .Values.auth.key }}"
            {{- else }}
            - name: FLE_STORAGE_STATE
              value: "{{ .Values.auth.mountPath }}/{{ .Values.auth.key }}"
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          {{- if .Values.families }}
          volumeMounts:
            - name: config
              mountPath: /etc/family-link/config
              readOnly: true
            {{- range .Values.families }}
            - name: family-{{ .name }}
              mountPath: /etc/family-link/families/{{ .name }}
              readOnly: true
            {{- end }}
          {{- else if include "family-link-exporter.hasSession" . }}
          volumeMounts:
            - name: google-session
              mountPath: {{ .Values.auth.mountPath }}
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.families }}
      volumes:
        - name: config
          configMap:
            name: {{ include "family-link-exporter.fullname" . }}-config
        {{- range .Values.families }}
        {{- $cookie := eq (.mode | default "storageState") "cookieFile" }}
        {{- $key := .key | default (ternary "cookies.txt" "storage_state.json" $cookie) }}
        - name: family-{{ .name }}
          secret:
            secretName: {{ required (printf "families[%s].existingSecret is required" .name) .existingSecret }}
            items:
              - key: {{ $key }}
                path: {{ $key }}
        {{- end }}
      {{- else if include "family-link-exporter.hasSession" . }}
      volumes:
        - name: google-session
          secret:
            secretName: {{ include "family-link-exporter.sessionSecretName" . }}
            items:
              - key: {{ .Values.auth.key }}
                path: {{ .Values.auth.key }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

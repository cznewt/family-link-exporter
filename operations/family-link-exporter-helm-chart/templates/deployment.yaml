apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "family-link-exporter.fullname" . }}
  labels:
    {{- include "family-link-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "family-link-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "family-link-exporter.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "family-link-exporter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          env:
            - name: FLE_HOST
              value: "0.0.0.0"
            - name: FLE_PORT
              value: {{ .Values.service.port | quote }}
            - name: FLE_TIMEZONE
              value: {{ .Values.config.timezone | quote }}
            - name: FLE_REFRESH_INTERVAL
              value: {{ .Values.config.refreshInterval | quote }}
            - name: FLE_ACCOUNT_IDS
              value: {{ .Values.config.accountIds | quote }}
            - name: FLE_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            {{- if include "family-link-exporter.hasSession" . }}
            - name: FLE_STORAGE_STATE
              value: "{{ .Values.auth.mountPath }}/{{ .Values.auth.key }}"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          {{- if include "family-link-exporter.hasSession" . }}
          volumeMounts:
            - name: google-session
              mountPath: {{ .Values.auth.mountPath }}
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if include "family-link-exporter.hasSession" . }}
      volumes:
        - name: google-session
          secret:
            secretName: {{ include "family-link-exporter.sessionSecretName" . }}
            items:
              - key: {{ .Values.auth.key }}
                path: {{ .Values.auth.key }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

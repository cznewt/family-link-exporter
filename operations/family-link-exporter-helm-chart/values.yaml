# Default values for family-link-exporter
replicaCount: 1

image:
  repository: ghcr.io/cznewt/family-link-exporter
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations for scrape autodiscovery. The default is the common
# prometheus.io/* convention. For clusters running Grafana k8s-monitoring
# (Alloy) — e.g. gedu — replace these with the k8s.grafana.com/* convention:
#   k8s.grafana.com/scrape: "true"
#   k8s.grafana.com/metrics.portName: "http"
#   k8s.grafana.com/metrics.path: "/metrics"
#   k8s.grafana.com/job: "family-link-exporter"
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9838"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 9838
  annotations: {}

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

# --- Multiple families -----------------------------------------------------
# One entry per parent Google account. Each references an existing Secret
# holding that family's credential; the chart renders an FLE_CONFIG file and
# mounts each Secret. Metrics are labelled with `family: <name>`.
# Leave empty ([]) to use the single-family `auth` block below instead.
families: []
#  - name: smith
#    mode: cookieFile          # or storageState
#    existingSecret: smith-session
#    key: cookies.txt          # the key in the Secret (and mounted filename)
#  - name: jones
#    mode: storageState
#    existingSecret: jones-session
#    key: storage_state.json
#    accountIds: []            # optional; default = all supervised kids

# --- Single-family credentials (used when `families` is empty) --------------
# The exporter needs a logged-in Google session (a Playwright storage_state
# JSON captured with `python -m family_link_exporter login`, or a cookies.txt).
# Provide it via an existing Secret (recommended), or inline it here and let the
# chart create one. With neither set, the pod runs but cannot authenticate
# (family_link_up == 0).
auth:
  # Credential format in the Secret:
  #   storageState -> a Playwright storage_state.json (from `... login`)
  #   cookieFile   -> a Netscape cookies.txt exported from a browser you're
  #                   logged into (use this if Google blocks the Playwright login)
  mode: storageState
  # Name of an existing Secret holding the session under `key`. Preferred.
  existingSecret: ""
  # Or paste storage_state.json content (chart creates a Secret). Keep out of git!
  # Tip: helm install ... --set-file auth.storageState=./storage_state.json
  storageState: ""
  # Key within the Secret and the filename mounted into the container.
  # For mode=cookieFile, set this to e.g. cookies.txt.
  key: storage_state.json
  # Directory the session is mounted into (read-only).
  mountPath: /etc/family-link-exporter

# --- Exporter configuration (FLE_* env vars) ------------------------------
config:
  # Timezone used to decide the daily "today" boundary. Set to the child's tz.
  timezone: "Europe/Prague"
  # Seconds between Kids Management API polls.
  refreshInterval: 900
  # Restrict to specific child account ids (comma-separated). Empty = all supervised.
  accountIds: ""
  logLevel: INFO

# Extra raw env vars, e.g. [{name: FLE_API_KEY, value: "..."}]
extraEnv: []

# ServiceMonitor for the Prometheus Operator
serviceMonitor:
  enabled: false
  interval: 60s
  scrapeTimeout: 30s
  labels: {}
  annotations: {}

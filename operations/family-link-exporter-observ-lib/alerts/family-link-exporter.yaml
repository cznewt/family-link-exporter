groups:
- name: family-link-exporter
  rules:
  - alert: FamilyLinkExporterDown
    annotations:
      description: '{{ $labels.instance }} has been unreachable for more than 5m.'
      summary: family-link-exporter is down.
    expr: up{job="family-link-exporter"} == 0
    for: 5m
    labels:
      severity: critical
  - alert: FamilyLinkExporterUnhealthy
    annotations:
      description: family_link_up is 0 for family {{ $labels.family }} on {{ $labels.instance
        }} (the Google session likely expired; refresh it).
      summary: family-link-exporter cannot reach the Kids Management API for a family.
    expr: family_link_up{job="family-link-exporter"} == 0
    for: 15m
    labels:
      severity: warning
  - alert: FamilyLinkExporterScrapeStale
    annotations:
      description: No successful collection on {{ $labels.instance }} for over 3600s.
      summary: family-link-exporter data is stale.
    expr: time() - family_link_last_scrape_timestamp_seconds{job="family-link-exporter"}
      > 3600
    for: 15m
    labels:
      severity: warning
